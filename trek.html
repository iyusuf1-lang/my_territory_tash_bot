<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Territory Trek</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Territory Trek">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--red:#FF3B3B;--blue:#2979FF;--green:#00E676;--yellow:#FFD600;--bg:#0a0a0f;--surface:#13131a;--border:rgba(255,255,255,.08);--text:#f0f0f8;--muted:rgba(240,240,248,.45)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* MAP */
#map{flex:1;position:relative;z-index:1}
#map::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,15,.2) 0%,transparent 25%);pointer-events:none;z-index:500}

/* LOADING */
#loading{position:absolute;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.loading-ring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* TEAM SCREEN */
#team-screen{
  position:absolute;inset:0;background:var(--bg);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;gap:0;
}
.ts-logo{font-size:48px;margin-bottom:12px;animation:bounce-in .6s both}
@keyframes bounce-in{from{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.15) rotate(5deg)}to{transform:scale(1) rotate(0);opacity:1}}
.ts-sub{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;animation:fade-up .5s .1s both}
.ts-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:28px;animation:fade-up .5s .2s both;line-height:1.2}
@keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;margin-bottom:20px}
.team-btn{
  padding:18px 14px;border-radius:18px;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:7px;
  animation:fade-up .5s both;
}
.team-btn:nth-child(1){animation-delay:.3s}
.team-btn:nth-child(2){animation-delay:.35s}
.team-btn:nth-child(3){animation-delay:.4s}
.team-btn:nth-child(4){animation-delay:.45s}
.team-btn:active{transform:scale(.93)}
.team-btn.selected{border-color:var(--tc);background:rgba(255,255,255,.05);box-shadow:0 0 0 1px var(--tc),0 4px 20px var(--tc-30),inset 0 0 20px var(--tc-10)}
.team-btn .t-emoji{font-size:32px;line-height:1}
.team-btn .t-name{font-size:13px;font-weight:700;color:var(--text)}

.start-btn{
  width:100%;max-width:320px;padding:17px;border-radius:16px;border:none;
  font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:10px;
  opacity:.35;pointer-events:none;transition:all .25s;
  background:rgba(255,255,255,.08);color:var(--text);
  animation:fade-up .5s .5s both;
}
.start-btn.active{opacity:1;pointer-events:auto;box-shadow:0 6px 24px rgba(0,0,0,.4)}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;z-index:600;pointer-events:none}
.stats-bar{
  margin:10px;background:rgba(10,10,15,.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:16px;border:1px solid var(--border);
  padding:11px 14px;display:flex;align-items:center;justify-content:space-between;
  pointer-events:auto;
}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px}
.stat-value{font-size:17px;font-weight:800;line-height:1;letter-spacing:-.01em}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.stat-divider{width:1px;height:30px;background:var(--border)}
.team-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700}

.gps-row{
  margin:0 10px 6px;display:flex;align-items:center;gap:7px;
  padding:7px 12px;background:rgba(10,10,15,.75);
  backdrop-filter:blur(8px);border-radius:20px;border:1px solid var(--border);
  font-size:11px;color:var(--muted);pointer-events:auto;width:fit-content;
}
.gps-dot{width:7px;height:7px;border-radius:50%;background:#666;flex-shrink:0}
.gps-dot.searching{background:var(--yellow);animation:pd 1s infinite}
.gps-dot.active{background:var(--green);animation:pd 2s infinite}
.gps-dot.error{background:var(--red)}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

/* BOTTOM PANEL */
#bottom-panel{position:absolute;bottom:0;left:0;right:0;z-index:600;padding:0 12px calc(12px + env(safe-area-inset-bottom));pointer-events:none}

.zone-alert{
  margin-bottom:10px;padding:13px 16px;
  background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.35);
  border-radius:16px;align-items:center;gap:10px;
  font-size:13px;font-weight:700;color:var(--green);
  display:none;pointer-events:auto;
  animation:alert-in .4s cubic-bezier(.34,1.56,.64,1);
}
.zone-alert.show{display:flex}
@keyframes alert-in{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

.action-row{display:flex;gap:10px;pointer-events:auto}
.btn-recenter{
  width:54px;height:54px;border-radius:16px;
  border:1px solid var(--border);background:rgba(10,10,15,.9);
  backdrop-filter:blur(12px);color:#fff;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:.15s;
}
.btn-recenter:active{transform:scale(.93)}
.btn-finish{
  flex:1;height:54px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#FF3B3B,#cc1a1a);color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 20px rgba(255,59,59,.4);transition:.15s;
}
.btn-finish:active{transform:scale(.96);box-shadow:none}

/* RESULT SCREEN */
#result-screen{
  position:absolute;inset:0;background:var(--bg);z-index:1500;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;gap:16px;
}
#result-screen.show{display:flex}
.result-emoji{font-size:72px;animation:bounce-in .6s both;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5))}
.result-title{font-size:26px;font-weight:900;text-align:center;letter-spacing:-.02em}
.result-subtitle{font-size:13px;color:var(--muted);text-align:center}
.result-card{
  width:100%;max-width:320px;background:var(--surface);
  border-radius:18px;border:1px solid var(--border);overflow:hidden;
}
.result-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--border);
}
.result-row:last-child{border-bottom:none}
.result-key{font-size:12px;color:var(--muted)}
.result-val{font-size:14px;font-weight:800}
.result-coin-row{background:rgba(255,214,0,.06);padding:14px 18px;border-bottom:none}

.btn-send{
  width:100%;max-width:320px;padding:17px;border-radius:16px;border:none;
  font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;
  letter-spacing:.04em;
}
.btn-send:disabled{opacity:.55;cursor:not-allowed}

/* MAP MARKERS */
.leaflet-control-zoom{display:none!important}
.cur-marker{width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,255,255,.2)}
.start-marker{width:12px;height:12px;border-radius:50%;border:3px solid #fff;background:var(--green);box-shadow:0 0 8px var(--green)}

/* OFFLINE */
.offline-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#ff4444,#e94560);color:#fff;text-align:center;font-size:11px;font-weight:700;padding:6px;z-index:3000;display:none;letter-spacing:.05em}
body.offline .offline-bar{display:block}

.saved-badge{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(0,230,118,.92);color:#0a0a0f;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:3000;display:none;animation:fadeUp .3s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="offline-bar">📡 OFFLINE — Trek lokalni saqlanmoqda</div>
<div class="saved-badge" id="saved-badge">💾 Trek saqlandi!</div>

<div id="loading">
  <div class="loading-ring"></div>
  <div class="loading-text">Yuklanmoqda...</div>
</div>

<!-- TEAM SELECTION -->
<div id="team-screen">
  <div class="ts-logo">🗺</div>
  <div class="ts-sub">Territory Trek</div>
  <div class="ts-title">Jamoangizni<br>tanlang</div>
  <div class="team-grid">
    <button class="team-btn" data-team="red" onclick="selectTeam('red','#FF3B3B')">
      <span class="t-emoji">🔴</span><span class="t-name">QIZIL</span>
    </button>
    <button class="team-btn" data-team="blue" onclick="selectTeam('blue','#2979FF')">
      <span class="t-emoji">🔵</span><span class="t-name">KO'K</span>
    </button>
    <button class="team-btn" data-team="green" onclick="selectTeam('green','#00E676')">
      <span class="t-emoji">🟢</span><span class="t-name">YASHIL</span>
    </button>
    <button class="team-btn" data-team="yellow" onclick="selectTeam('yellow','#FFD600')">
      <span class="t-emoji">🟡</span><span class="t-name">SARIQ</span>
    </button>
  </div>
  <button class="start-btn" id="start-trek-btn" onclick="startTrek()">
    ▶ &nbsp;TREKNI BOSHLASH
  </button>
</div>

<div id="map"></div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value" id="stat-dist">0.000</div>
      <div class="stat-label">KM</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-value" id="stat-pts">0</div>
      <div class="stat-label">NUQTA</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-value" id="stat-time">00:00</div>
      <div class="stat-label">VAQT</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-value" id="stat-coins" style="color:var(--yellow)">🪙0</div>
      <div class="stat-label">COIN</div>
    </div>
    <div class="stat-divider"></div>
    <div class="team-badge" id="team-badge">
      <span id="team-emoji">🔴</span>
      <span id="team-name">QIZIL</span>
    </div>
  </div>
  <div class="gps-row">
    <div class="gps-dot searching" id="gps-dot"></div>
    <span id="gps-text">GPS aniqlanmoqda...</span>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel" style="display:none">
  <div class="zone-alert" id="zone-alert">
    ✅ &nbsp;Aylana yopildi! Trek tugatish mumkin
  </div>
  <div class="action-row">
    <button class="btn-recenter" onclick="recenter()">📍</button>
    <button class="btn-finish" onclick="finishTrek()">⏹ &nbsp;Trek Tugatish</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-emoji" id="result-icon">✅</div>
  <div class="result-title" id="result-title">Trek yakunlandi!</div>
  <div class="result-subtitle" id="result-subtitle">Natijalaringiz</div>
  <div class="result-card" id="result-stats"></div>
  <button class="btn-send" id="result-btn" onclick="sendResult()">🏴 Zona yaratish</button>
</div>

<script>
// ══ TELEGRAM ══
let tg=null, tgInitRetries=0;
const MAX_RETRIES=10;
function initTelegramWebApp(){
  if(window.Telegram?.WebApp){
    tg=window.Telegram.WebApp; tg.ready(); tg.expand();
    tg.setHeaderColor('#0a0a0f'); tg.setBackgroundColor('#0a0a0f');
  } else if(tgInitRetries<MAX_RETRIES){
    tgInitRetries++;
    setTimeout(initTelegramWebApp,100);
  }
}
initTelegramWebApp();

const RAILWAY_URL='https://myterritorytashbot-production.up.railway.app';
function getApiUrl(){
  const p=new URLSearchParams(window.location.search);
  const ap=p.get('api'); if(ap) return decodeURIComponent(ap);
  if(tg?.initDataUnsafe?.start_param?.startsWith('api_'))
    return decodeURIComponent(tg.initDataUnsafe.start_param.replace('api_',''));
  return RAILWAY_URL;
}

const TC={
  red:   {color:'#FF3B3B',emoji:'🔴',name:'QIZIL'},
  blue:  {color:'#2979FF',emoji:'🔵',name:"KO'K"},
  green: {color:'#00E676',emoji:'🟢',name:'YASHIL'},
  yellow:{color:'#FFD600',emoji:'🟡',name:'SARIQ'},
};

let S={
  team:null,color:null,points:[],tracking:false,
  watchId:null,startTime:null,timerInt:null,isClosed:false,
  map:null,polyline:null,closingLine:null,
  curMarker:null,startMarker:null,sent:false,
};

// ══ MAP ══
function initMap(){
  S.map=L.map('map',{zoomControl:false}).setView([41.2995,69.2401],16);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; CartoDB',maxZoom:19,
  }).addTo(S.map);
  loadZonesOnMap();
}

async function loadZonesOnMap(){
  try{
    const res=await fetch(`${getApiUrl()}/api/zones`);
    const zones=await res.json();
    const teamColors={red:'#FF3B3B',blue:'#2979FF',green:'#00E676',yellow:'#FFD600'};
    zones.forEach(z=>{
      const color=teamColors[z.team]||'#888';
      const health=z.health||100;
      const opacity=0.08+(health/300)*0.25;
      const weight=health>150?4:health>80?2:1;
      try{
        if(z.zone_type==='polygon'){
          const pts=JSON.parse(z.geometry);
          L.polygon(pts.map(p=>[p.lat,p.lng]),{color,fillColor:color,fillOpacity:opacity,weight})
            .addTo(S.map).bindTooltip(`${z.team} #${z.id} 💊${health}`,{permanent:false});
        } else if(z.zone_type==='circle'){
          const g=JSON.parse(z.geometry);
          L.circle([g.lat,g.lng],{radius:g.radius,color,fillColor:color,fillOpacity:opacity,weight})
            .addTo(S.map).bindTooltip(`${z.team} #${z.id} 💊${health}`,{permanent:false});
        }
      }catch(e){}
    });
  }catch(e){console.warn('[MAP] Zones error:',e);}
}

// ══ TEAM ══
function selectTeam(team,color){
  S.team=team; S.color=TC[team].color;
  document.querySelectorAll('.team-btn').forEach(b=>{
    b.classList.remove('selected');
    b.style.removeProperty('--tc');
    b.style.removeProperty('--tc-30');
    b.style.removeProperty('--tc-10');
  });
  const btn=document.querySelector(`[data-team="${team}"]`);
  btn.classList.add('selected');
  btn.style.setProperty('--tc',color);
  btn.style.setProperty('--tc-30',color+'4D');
  btn.style.setProperty('--tc-10',color+'1A');
  const sb=document.getElementById('start-trek-btn');
  sb.classList.add('active');
  sb.style.background=color;
  sb.style.color=team==='yellow'?'#0a0a0f':'#fff';
}

// ══ START ══
function startTrek(){
  if(!S.team) return;
  document.getElementById('team-screen').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('bottom-panel').style.display='block';
  const t=TC[S.team];
  document.getElementById('team-emoji').textContent=t.emoji;
  document.getElementById('team-name').textContent=t.name;
  document.getElementById('team-badge').style.cssText=`background:${S.color}22;color:${S.color};border:1px solid ${S.color}44`;
  S.tracking=true; S.startTime=Date.now();
  S.timerInt=setInterval(updateTimer,1000);
  S.polyline=L.polyline([],{color:S.color,weight:4,opacity:.9,lineJoin:'round',lineCap:'round'}).addTo(S.map);
  setTimeout(()=>S.map.invalidateSize(),100);
  startGPS();
  document.getElementById('loading').classList.add('hide');
}

// ══ GPS ══
function startGPS(){
  if(!navigator.geolocation){setGps('error','❌ GPS mavjud emas');return;}
  setGps('searching','GPS aniqlanmoqda...');
  S.watchId=navigator.geolocation.watchPosition(onGPS,onGPSErr,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function onGPS(pos){
  const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
  setGps('active',`±${Math.round(acc)}m aniqlik`);
  if(S.points.length===0){
    S.map.setView([lat,lng],17);
    const si=L.divIcon({className:'',html:'<div class="start-marker"></div>',iconSize:[12,12],iconAnchor:[6,6]});
    S.startMarker=L.marker([lat,lng],{icon:si}).addTo(S.map);
  }
  if(S.points.length>0){
    const last=S.points[S.points.length-1];
    if(hav(last.lat,last.lng,lat,lng)<8) return;
  }
  S.points.push({lat:Math.round(lat*100000)/100000,lng:Math.round(lng*100000)/100000});
  S.polyline.setLatLngs(S.points.map(p=>[p.lat,p.lng]));
  if(S.points.length>=3){
    const f=S.points[0],l=S.points[S.points.length-1];
    if(S.closingLine) S.closingLine.remove();
    S.closingLine=L.polyline([[l.lat,l.lng],[f.lat,f.lng]],{color:S.color,weight:2,opacity:.35,dashArray:'6,8'}).addTo(S.map);
  }
  const icon=L.divIcon({className:'',html:`<div class="cur-marker" style="background:${S.color}"></div>`,iconSize:[18,18],iconAnchor:[9,9]});
  if(S.curMarker) S.curMarker.setLatLng([lat,lng]);
  else S.curMarker=L.marker([lat,lng],{icon}).addTo(S.map);
  document.getElementById('stat-dist').textContent=(calcDist()/1000).toFixed(3);
  document.getElementById('stat-pts').textContent=S.points.length;
  const previewCoins=Math.max(1,Math.round((calcDist()/1000)*10));
  document.getElementById('stat-coins').textContent='🪙'+previewCoins;
  if(!navigator.onLine) saveLocalTrek();
  if(S.points.length>=8&&!S.isClosed){
    const f=S.points[0],l=S.points[S.points.length-1];
    if(hav(f.lat,f.lng,l.lat,l.lng)<=50){
      S.isClosed=true;
      document.getElementById('zone-alert').classList.add('show');
      S.polyline.setStyle({weight:5,opacity:1});
      if(S.closingLine) S.closingLine.remove();
      L.polygon(S.points.map(p=>[p.lat,p.lng]),{color:S.color,fillColor:S.color,fillOpacity:.18,weight:3}).addTo(S.map);
    }
  }
}

function onGPSErr(err){
  const m={1:'GPS ruxsat berilmadi ❌',2:"GPS signali yo'q 📡",3:'GPS vaqt tugadi ⏱'};
  setGps('error',m[err.code]||'GPS xato');
}

// ══ CONTROLS ══
function recenter(){
  if(S.points.length>0){const l=S.points[S.points.length-1];S.map.setView([l.lat,l.lng],17,{animate:true});}
}
function updateTimer(){
  const e=Math.floor((Date.now()-S.startTime)/1000);
  document.getElementById('stat-time').textContent=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;
}

// ══ FINISH ══
function finishTrek(){
  if(S.points.length<5){alert('Trek juda qisqa! Kamida 5 nuqta kerak.');return;}
  if(S.watchId!==null){navigator.geolocation.clearWatch(S.watchId);S.watchId=null;}
  clearInterval(S.timerInt); S.tracking=false;
  const dist=calcDist();
  const e=Math.floor((Date.now()-S.startTime)/1000);
  const mStr=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;
  const t=TC[S.team];
  let closeD='—';
  if(S.points.length>1) closeD=Math.round(hav(S.points[0].lat,S.points[0].lng,S.points[S.points.length-1].lat,S.points[S.points.length-1].lng));
  const coinsEarned=Math.max(1,Math.round((dist/1000)*10));
  document.getElementById('result-icon').textContent=S.isClosed?'🏴':'⚠️';
  document.getElementById('result-title').textContent=S.isClosed?'Zona yaratildi!':'Trek yakunlandi';
  document.getElementById('result-subtitle').textContent=S.isClosed?`+${coinsEarned} coin qo'shildi! 🪙`:'Natijalaringiz';
  document.getElementById('result-stats').innerHTML=`
    <div class="result-row"><span class="result-key">📏 Masofa</span><span class="result-val">${(dist/1000).toFixed(3)} km</span></div>
    <div class="result-row"><span class="result-key">📍 Nuqtalar</span><span class="result-val">${S.points.length}</span></div>
    <div class="result-row"><span class="result-key">⏱ Vaqt</span><span class="result-val">${mStr}</span></div>
    <div class="result-row"><span class="result-key">🎽 Jamoa</span><span class="result-val" style="color:${t.color}">${t.emoji} ${t.name}</span></div>
    <div class="result-row"><span class="result-key">🔒 Zona</span><span class="result-val" style="color:${S.isClosed?'#00E676':'#FF3B3B'}">${S.isClosed?'✅ Yopiq':'⚠️ '+closeD+'m qoldi'}</span></div>
    <div class="result-row result-coin-row"><span class="result-key">🪙 Coin</span><span class="result-val" style="color:#FFD600;font-size:16px">+${coinsEarned}</span></div>
  `;
  const btn=document.getElementById('result-btn');
  if(S.isClosed){btn.textContent='🏴 Zona yaratish';btn.style.cssText='background:#00E676;color:#0a0a0f';}
  else{btn.textContent='📤 Trek saqlash';btn.style.cssText='background:#333;color:#fff';}
  document.getElementById('result-screen').classList.add('show');
}

// ══ SEND ══
async function sendResult(){
  if(S.sent) return;
  if(!tg||!tg.initData||tg.initData.trim()===''){
    const btn=document.getElementById('result-btn');
    btn.textContent='❌ Telegram orqali oching!';
    btn.style.cssText='background:#FF3B3B;color:#fff';
    return;
  }
  S.sent=true;
  const btn=document.getElementById('result-btn');
  btn.disabled=true; btn.textContent='⏳ Yuborilmoqda...';
  const payload={init_data:tg.initData,team:S.team,points:S.points,distance:Math.round(calcDist()),closed:S.isClosed};
  try{
    const res=await fetch(`${getApiUrl()}/api/trek_submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    let json; try{json=await res.json();}catch(parseErr){throw new Error(`Server xato: ${res.status}`);}
    if(res.ok&&json.ok){
      btn.textContent='✅ Yuborildi!'; btn.style.cssText='background:#00E676;color:#0a0a0f';
      localStorage.removeItem('pending_trek');
      setTimeout(()=>{try{tg?.close();}catch(e){}},2000);
    } else {
      const errorCode=json.error_code||'UNKNOWN';
      if(errorCode==='SESSION_EXPIRED'){
        btn.textContent='⏰ Sessiya tugadi. Botni qayta oching';
        btn.style.cssText='background:#FFD600;color:#0a0a0f';
        S.sent=false; btn.disabled=false;
        setTimeout(()=>{if(confirm('Sessiya tugadi. Telegram botini yopib qayta oching. Hozir yopishni xohlaysizmi?'))try{tg?.close();}catch(e){}},2000);
      } else throw new Error(json.error||`HTTP ${res.status}`);
    }
  }catch(e){
    if(!navigator.onLine){
      saveLocalTrek();
      btn.textContent='💾 Offline saqlandi';
      btn.style.cssText='background:#FFD600;color:#0a0a0f';
      if('serviceWorker' in navigator&&'SyncManager' in window){
        const reg=await navigator.serviceWorker.ready;
        await reg.sync.register('sync-treks').catch(()=>{});
      }
    } else {
      S.sent=false; btn.disabled=false;
      btn.textContent=`❌ Xato: ${e.message}`;
      btn.style.cssText='background:#FF3B3B;color:#fff';
      setTimeout(()=>{btn.textContent=S.isClosed?'🔄 Qayta urinish':'🔄 Qayta yuborish';btn.style.cssText='background:#FFD600;color:#0a0a0f';},3000);
    }
  }
}

// ══ OFFLINE ══
function saveLocalTrek(){
  const data={team:S.team,points:S.points,distance:Math.round(calcDist()),closed:S.isClosed,savedAt:Date.now()};
  localStorage.setItem('pending_trek',JSON.stringify(data));
  const badge=document.getElementById('saved-badge');
  badge.style.display='block';
  setTimeout(()=>badge.style.display='none',2500);
}

function hav(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function calcDist(){let t=0;for(let i=1;i<S.points.length;i++)t+=hav(S.points[i-1].lat,S.points[i-1].lng,S.points[i].lat,S.points[i].lng);return t;}
function setGps(s,t){document.getElementById('gps-dot').className='gps-dot '+s;document.getElementById('gps-text').textContent=t;}

function updateNet(){document.body.classList.toggle('offline',!navigator.onLine);}
window.addEventListener('online',()=>{updateNet();if(S.points.length>0)syncPendingTrek();});
window.addEventListener('offline',updateNet);
updateNet();

async function syncPendingTrek(){
  const raw=localStorage.getItem('pending_trek');
  if(!raw||!tg?.initData) return;
  try{
    const data=JSON.parse(raw);
    const res=await fetch(`${getApiUrl()}/api/trek_submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({init_data:tg.initData,...data})});
    if(res.ok){localStorage.removeItem('pending_trek');console.log('[PWA] Trek synced!');}
  }catch(e){console.warn('[PWA] Sync failed:',e);}
}

window.addEventListener('load',()=>{
  initMap();
  const p=new URLSearchParams(window.location.search);
  const pt=p.get('team');
  if(pt&&TC[pt]) selectTeam(pt,TC[pt].color);
  if(tg?.initDataUnsafe?.start_param){const t=tg.initDataUnsafe.start_param;if(TC[t])selectTeam(t,TC[t].color);}
  setTimeout(()=>document.getElementById('loading').classList.add('hide'),800);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js')
      .then(r=>{console.log('[PWA] SW registered');syncPendingTrek();})
      .catch(e=>console.warn('[PWA] SW error:',e));
  }
});
</script>
